<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>新西兰仓库可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f5f6fa; }
        #toolbar {
            position: fixed;
            left: 16px;
            top: 16px;
            z-index: 10;
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            width: 360px;
        }
        #toolbar .row { display: flex; gap: 8px; margin-bottom: 8px; }
        #toolbar label { font-size: 13px; color: #333; }
        #channelInput {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 13px;
        }
        #queryBtn {
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            color: #fff;
            background: #1677ff;
        }
        #statusText {
            font-size: 12px;
            color: #666;
            line-height: 1.4;
            min-height: 34px;
        }
        #warehouse-map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="toolbar">
        <label for="channelInput">渠道筛选（可选，多个渠道用逗号分隔）</label>
        <div class="row">
            <input id="channelInput" placeholder="例如：Retail,Online" />
            <button id="queryBtn">查询</button>
        </div>
        <div id="statusText">正在加载地图...</div>
    </div>
    <div id="warehouse-map"></div>

    <script>
        const chartDom = document.getElementById('warehouse-map');
        const statusText = document.getElementById('statusText');
        const channelInput = document.getElementById('channelInput');
        const queryBtn = document.getElementById('queryBtn');
        const myChart = echarts.init(chartDom);

        let mapReady = false;

        function formatNumber(num) {
            return Number(num || 0).toLocaleString(undefined, { maximumFractionDigits: 2 });
        }

        function getChannelsFromInput() {
            return channelInput.value
                .split(',')
                .map(item => item.trim())
                .filter(Boolean);
        }

        function buildDataUrl(channels) {
            const url = new URL('/get-data', window.location.origin);
            channels.forEach(ch => url.searchParams.append('channel', ch));
            return url.toString();
        }

        function renderChart(payload) {
            const list = Array.isArray(payload.data) ? payload.data : [];
            const mapped = list.filter(item => Array.isArray(item.coords) && item.coords.length === 2);

            const seriesData = mapped.map(item => ({
                name: item.name,
                value: [item.coords[0], item.coords[1], Number(item.volume || 0)],
                raw: item
            }));

            const option = {
                title: {
                    text: `新西兰仓库占用体积分布（总计 ${formatNumber(payload.total)} m³）`,
                    left: 'center',
                    top: 12
                },
                tooltip: {
                    trigger: 'item',
                    formatter: function (params) {
                        const raw = params.data.raw;
                        const volume = Number(raw.volume || 0);
                        const capacity = raw.capacity == null ? null : Number(raw.capacity);
                        const ratio = capacity ? ((volume / capacity) * 100).toFixed(1) : 'N/A';
                        const coordsText = `${params.value[1].toFixed(6)}, ${params.value[0].toFixed(6)}`;
                        return [
                            `<b>${raw.name}</b>`,
                            `坐标(纬度, 经度): ${coordsText}`,
                            `体积: ${formatNumber(volume)} m³`,
                            `容量: ${capacity == null ? 'N/A' : `${formatNumber(capacity)} m³`}`,
                            `占用率: ${ratio === 'N/A' ? 'N/A' : `${ratio}%`}`
                        ].join('<br/>');
                    }
                },
                geo: {
                    map: 'NZ',
                    roam: true,
                    zoom: 4.1,
                    center: [173.5, -41.2],
                    itemStyle: {
                        areaColor: '#eef2f7',
                        borderColor: '#999'
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: '#dce5f1'
                        }
                    }
                },
                series: [
                    {
                        name: '仓库体积',
                        type: 'scatter',
                        coordinateSystem: 'geo',
                        data: seriesData,
                        symbolSize: function (val) {
                            return Math.max(10, Math.sqrt(val[2]) / 8);
                        },
                        label: {
                            show: true,
                            position: 'right',
                            formatter: '{b}',
                            color: '#333'
                        },
                        itemStyle: {
                            color: '#ff7a45'
                        }
                    }
                ]
            };

            myChart.setOption(option);

            const channels = payload.filters && Array.isArray(payload.filters.channels)
                ? payload.filters.channels
                : [];
            const channelLabel = channels.length ? `渠道: ${channels.join(', ')}` : '渠道: 全部';
            const unmapped = Array.isArray(payload.unmappedWarehouses) ? payload.unmappedWarehouses : [];
            const unmappedLabel = unmapped.length
                ? `；缺少坐标: ${unmapped.join(', ')}`
                : '';
            statusText.textContent = `${channelLabel}；已展示 ${seriesData.length}/${list.length} 个仓库${unmappedLabel}`;
        }

        async function loadMap() {
            const response = await fetch('nz.json');
            if (!response.ok) {
                throw new Error('找不到 nz.json，请确认文件路径。');
            }
            const mapData = await response.json();
            echarts.registerMap('NZ', mapData);
            mapReady = true;
        }

        async function loadData() {
            try {
                if (!mapReady) {
                    statusText.textContent = '正在加载地图底图...';
                    await loadMap();
                }
                statusText.textContent = '正在查询仓库体积...';
                const channels = getChannelsFromInput();
                const res = await fetch(buildDataUrl(channels));
                const payload = await res.json();
                if (payload.status !== 'success') {
                    throw new Error(payload.message || '接口返回异常');
                }
                renderChart(payload);
            } catch (err) {
                statusText.textContent = `加载失败：${err.message}`;
            }
        }

        queryBtn.addEventListener('click', loadData);
        channelInput.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                loadData();
            }
        });
        window.addEventListener('resize', () => myChart.resize());

        loadData();
    </script>
</body>
</html>
